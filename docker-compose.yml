# WARNING: dev only, change credentials if using in production

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: crs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: crs_db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql:Z
      - ./Database_Scripts/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql:ro
      - ./Database_Scripts/data.sql:/docker-entrypoint-initdb.d/2-data.sql:ro
    networks:
      - crs-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tomee:
    image: tomee:webprofile
    container_name: crs-tomee
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Xmx512m -Djava.security.egd=file:/dev/./urandom -Dtomee.deployDir=/usr/local/tomee/webapps/ROOT -Dtomee.deployMode=exploded"
      DB_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT}
      MAIL_SMTP_USERNAME: ${MAIL_SMTP_USERNAME}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE}
    volumes:
      - ./target/course-recovery-system:/usr/local/tomee/webapps/ROOT:Z
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - crs-network

networks:
  crs-network:
    driver: bridge
